name: Keep backend awake

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos
  workflow_dispatch:          # permite dispararlo manual desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -sf https://bookwise-h7ib.onrender.com/health || echo "Ping falló — el server puede estar reiniciando"